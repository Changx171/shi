        }

        }

            font-style: italic;
        }

        .mood-section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 16px;
            color: #7F8C8D;
            margin-bottom: 12px;
            display: block;
        }

        .mood-grid {

            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            background-color: #FFFFFF;
            border-radius: 12px;
            border: 2px solid;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            cursor: pointer;
        }

        .mood-item.active {

        }

        .mood-emoji {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .mood-name {
            font-size: 14px;
            color: #2C3E50;
        }

        }

        }

            padding: 6px 16px;

            margin-bottom: 16px;
        }

        .poem-header {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
        }

        .poem-header::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 30%;
            width: 40%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #C44536, transparent);

            font-size: 32px;
            font-weight: 500;
            color: #2C3E50;
            display: block;
            font-family: "KaiTi", serif;
            margin-bottom: 8px;

            color: #7F8C8D;
            display: block;
        }

        .poem-content {
            margin-bottom: 24px;
        }

            line-height: 2;
            color: #2C3E50;

        }

            text-align: center;

        }

            padding: 40px;
            color: #95A5A6;
            font-size: 16px;
        }

        .poem-count {
            text-align: center;
            font-size: 14px;
            color: #95A5A6;
            margin-top: 20px;
            padding: 10px;
            border-top: 1px dashed #E8E0D5;
        }

</head>

                moods: ["complex"],

                moods: ["complex"],

            {

                title: "临江仙",
                author: "苏轼",
                dynasty: "宋",
                content: ["夜饮东坡醒复醉", "归来仿佛三更", "家童鼻息已雷鸣", "敲门都不应", "倚杖听江声", "长恨此身非我有", "何时忘却营营", "夜阑风静縠纹平", "小舟从此逝", "江海寄余生"],
                moods: ["complex"],
                psychology: "喝醉了没人开门，只好听江水。突然觉得，这个身体不是我的，什么时候才能不管那些俗事？这种出世的念头，和入世的身体，在打架。"
            },
            {
                id: "c021",
                title: "江城子",
                author: "苏轼",
                dynasty: "宋",
                content: ["十年生死两茫茫", "不思量", "自难忘", "千里孤坟", "无处话凄凉"],
                moods: ["complex"],
                psychology: "十年了，不去想，但忘不掉。这种矛盾，就是思念的本质。"
            },
            {
                id: "c022",
                title: "蝶恋花",
                author: "苏轼",
                dynasty: "宋",
                content: ["花褪残红青杏小", "燕子飞时", "绿水人家绕", "枝上柳绵吹又少", "天涯何处无芳草"],
                moods: ["complex"],
                psychology: "花谢了，青杏小；柳絮少了，芳草多。失去和得到同时发生。苏轼用自然告诉你：生活就是这样。"
            },
            {
                id: "c023",
                title: "浣溪沙",
                author: "苏轼",
                dynasty: "宋",
                content: ["山下兰芽短浸溪", "松间沙路净无泥", "潇潇暮雨子规啼", "谁道人生无再少", "门前流水尚能西", "休将白发唱黄鸡"],
                moods: ["complex"],
                psychology: "流水还能向西，人为什么不能重返年轻？这种不服老，和已经老了的事实，构成复杂。"
            },
            {

                author: "贺铸",
                dynasty: "宋",
                content: ["凌波不过横塘路", "但目送", "芳尘去", "锦瑟华年谁与度", "月桥花院", "琐窗朱户", "只有春知处"],
                moods: ["complex"],

                moods: ["complex"],
                psychology: "找不到楼台，找不到渡口，找不到桃源。一个人在旅馆，听杜鹃叫。这种迷失感，是现代人的日常。"

            {

                title: "鹊桥仙",
                author: "秦观",

                content: ["纤云弄巧", "飞星传恨", "银汉迢迢暗度", "金风玉露一相逢", "便胜却人间无数"],
                moods: ["complex"],
                psychology: "牛郎织女一年见一次，却胜过人间无数。秦观告诉你：质量比数量重要。这种价值观，本身就很复杂。"
            },
            {
                id: "c027",
                title: "浣溪沙",
                author: "晏殊",
                dynasty: "宋",
                content: ["一曲新词酒一杯", "去年天气旧亭台", "夕阳西下几时回", "无可奈何花落去", "似曾相识燕归来", "小园香径独徘徊"],
                moods: ["complex"],
                psychology: "花落无可奈何，燕归似曾相识。失去和得到同时发生。晏殊一个人在小路上走来走去，心里一定很复杂。"
            },
            {
                id: "c028",
                title: "蝶恋花",
                author: "欧阳修",
                dynasty: "宋",
                content: ["庭院深深深几许", "云窗雾阁春迟", "柳丝袅娜拂行舟", "烟缕织成愁"],
                moods: ["complex"],
                psychology: "愁像烟缕，织成网。欧阳修告诉你：有时候说不出为什么难过，就是心里有团雾。"
            },
            {
                id: "c029",
                title: "生查子",
                author: "欧阳修",
                dynasty: "宋",
                content: ["去年元夜时", "花市灯如昼", "月上柳梢头", "人约黄昏后", "今年元夜时", "月与灯依旧", "不见去年人", "泪满春衫袖"],
                moods: ["complex"],
                psychology: "同样的节日，同样的月亮，人却不在了。这种物是人非，最让人复杂。"
            },
            {
                id: "c030",
                title: "浪淘沙",
                author: "欧阳修",
                dynasty: "宋",
                content: ["把酒祝东风", "且共从容", "垂杨紫陌洛城东", "总是当时携手处", "游遍芳丛", "聚散苦匆匆", "此恨无穷", "今年花胜去年红", "可惜明年花更好", "知与谁同"],
                moods: ["complex"],
                psychology: "今年花比去年好，明年可能更好，但和谁一起看呢？这种对未来的期待和不确定，交织在一起。"
            }
        ];

        // 情感映射
        const moodMap = {
            sad: { name: "悲伤", emoji: "🌧️", color: "#6D7F8F" },
            lonely: { name: "孤独", emoji: "🌙", color: "#4A6A8A" },
            tired: { name: "疲惫", emoji: "😴", color: "#7F8C8D" },
            anxious: { name: "焦虑", emoji: "😰", color: "#E67E22" },
            complex: { name: "复杂", emoji: "🌀", color: "#8E6B5C" },
            calm: { name: "平静", emoji: "🌊", color: "#7CB490" },
            healing: { name: "治愈", emoji: "🌸", color: "#F9B83A" },
            warm: { name: "温暖", emoji: "☀️", color: "#F39C6D" },
            hopeful: { name: "希望", emoji: "✨", color: "#F7DC6F" },
            spring: { name: "春日", emoji: "🌸", color: "#F8BBD9" },
            joy: { name: "高兴", emoji: "😊", color: "#FFD966" }
        };

        // 情感关键词
        const moodKeywords = {
            sad: ["难过", "伤心", "想哭", "难受", "emo", "心碎", "悲伤", "痛苦", "绝望", "失落", "哀伤", "忧郁"],
            lonely: ["孤独", "一个人", "没人懂", "寂寞", "孤单", "独自", "想家", "思念", "怀念", "无人", "独"],
            tired: ["累", "疲惫", "困", "没劲", "不想动", "虚脱", "乏力", "透支", "耗尽", "瘫", "撑不住", "扛不住"],
            anxious: ["焦虑", "紧张", "压力", "烦躁", "不安", "慌", "担心", "害怕", "失眠", "喘不过气", "心跳"],
            complex: ["复杂", "说不清", "矛盾", "纠结", "混乱", "五味杂陈", "理不清", "又喜又悲", "百感交集"],
            calm: ["平静", "安静", "平和", "宁静", "放空", "心如止水", "淡然", "舒坦", "自在", "安稳", "静"],
            healing: ["治愈", "被安慰", "抱抱", "需要温暖", "心疼", "柔软", "想被理解", "想被爱", "安慰"],
            warm: ["温暖", "感动", "幸福", "美好", "温馨", "心里暖暖", "感恩", "满足", "安心", "暖"],
            hopeful: ["希望", "期待", "向前看", "光明", "未来", "相信", "会好的", "加油", "坚持", "熬过去", "明天"],
            spring: ["暖", "春天", "春", "花开", "变暖", "阳光", "明媚", "春风", "复苏", "绿", "燕子", "生机"],
            joy: ["高兴", "开心", "快乐", "喜悦", "欢快", "兴奋", "哈哈", "嘿嘿", "好爽", "幸福"]
        };

        // 状态管理
        let state = {
            userInput: '',
            selectedMood: null,
            result: null,
            noResult: false,
            isSearching: false,
            lastMood: null,
            lastResult: null,
            isInputActive: false
        };

        // DOM 元素
        const userInput = document.getElementById('userInput');
        const submitBtn = document.getElementById('submitBtn');
        const resultContainer = document.getElementById('resultContainer');
        const emptyContainer = document.getElementById('emptyContainer');
        const moodGrid = document.getElementById('moodGrid');

        // 渲染心情标签
        function renderMoodTags() {
            let html = '';
            for (const [key, value] of Object.entries(moodMap)) {
                const isActive = state.selectedMood === key;
                html += `
                    <div class="mood-item ${isActive ? 'active' : ''}" 
                         data-mood="${key}"
                         style="border-color: ${value.color}; background-color: ${isActive ? value.color : '#FFFFFF'}">
                        <span class="mood-emoji">${value.emoji}</span>
                        <span class="mood-name">${value.name}</span>
                    </div>
                `;
            }
            moodGrid.innerHTML = html;

            document.querySelectorAll('.mood-item').forEach(item => {
                item.addEventListener('click', () => {
                    const mood = item.dataset.mood;
                    selectMood(mood);
                });
            });
        }

        function selectMood(mood) {
            state.selectedMood = mood;
            state.userInput = '';
            state.isInputActive = false;
            userInput.value = '';
            renderMoodTags();
            updateSubmitBtnState();
            getPoem();
        }

        function updateSubmitBtnState() {
            const hasInput = state.userInput.trim().length > 0;
            const hasMood = state.selectedMood !== null;

            if (hasInput || hasMood) {
                submitBtn.classList.add('active');
                submitBtn.disabled = false;
            } else {
                submitBtn.classList.remove('active');
                submitBtn.disabled = true;
            }
        }

        function matchMood(input) {
            if (state.selectedMood && !state.isInputActive) {
                return state.selectedMood;
            }

            for (let [mood, keywords] of Object.entries(moodKeywords)) {
                for (let keyword of keywords) {
                    if (input.includes(keyword)) {
                        return mood;
                    }
                }
            }
            return 'calm';
        }

        function searchByTitle(input) {
            const searchText = input.trim();
            if (!searchText) return null;

            let exactMatch = poems.find(p => p.title === searchText);
            if (exactMatch) return exactMatch;

            let startMatch = poems.find(p => p.title.startsWith(searchText));
            if (startMatch) return startMatch;

            if (searchText.length >= 2) {
                let includesMatch = poems.find(p => p.title.includes(searchText));
                if (includesMatch) return includesMatch;
            }

            return null;
        }

        function recommendPoem(userInput) {
            const mood = matchMood(userInput);

            const candidates = poems.filter(p => p.moods && p.moods.includes(mood));

            if (candidates.length === 0) {
                state.noResult = true;
                return null;
            }

            state.noResult = false;
            const poem = candidates[Math.floor(Math.random() * candidates.length)];

            return {
                poem,
                mood: moodMap[mood] || { name: '平静', emoji: '🌊', color: '#7CB490' },
                psychology: poem.psychology || "这首诗送给你"
            };
        }

        function renderResult() {
            if (!state.result) {
                resultContainer.innerHTML = '';
                emptyContainer.style.display = 'flex';
                return;
            }

            emptyContainer.style.display = 'none';

            const result = state.result;
            const poem = result.poem;
            const mood = result.mood;

            let contentHtml = '';
            poem.content.forEach(line => {
                contentHtml += `<span class="poem-line">${line}</span>`;
            });

            const html = `
                <div class="result-card">
                    <div class="mood-tag" style="background-color: ${mood.color}20">
                        <span class="mood-emoji">${mood.emoji}</span>
                        <span class="mood-name">${mood.name}</span>
                    </div>
                    
                    <div class="poem-header">
                        <span class="poem-title">${poem.title}</span>
                        <span class="poem-author">${poem.author} · ${poem.dynasty}</span>
                    </div>
                    
                    <div class="poem-content">
                        ${contentHtml}
                    </div>
                    
                    <div class="psychology-box">
                        <div class="psychology-title">
                            🧠 心理学一刻
                            <span>大白话版</span>
                        </div>
                        <div class="psychology-text">
                            ${result.psychology}
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="action-btn again-btn" id="againBtn" ${state.isSearching ? 'disabled' : ''}>🎲 再换一首</button>
                        <button class="action-btn share-btn" id="shareBtn" ${state.isSearching ? 'disabled' : ''} onclick="alert('点右上角菜单可以分享本页')">📤 分享诗意</button>
                    </div>
                </div>
            `;

            resultContainer.innerHTML = html;

            document.getElementById('againBtn')?.addEventListener('click', changePoem);
        }

        function getPoem(useSameMood = false) {
            if (!state.userInput.trim() && !state.selectedMood) {
                alert('选个心情或写点什么吧');
                return;
            }

            state.isSearching = true;
            submitBtn.innerText = '寻找中...';

            setTimeout(() => {
                const poemByTitle = searchByTitle(state.userInput);

                if (poemByTitle) {
                    state.result = {
                        poem: poemByTitle,
                        mood: { name: '诗词', emoji: '📖', color: '#95A5A6' },
                        psychology: poemByTitle.psychology || "你找的这首诗"
                    };
                    state.noResult = false;
                    state.lastMood = null;
                    state.lastResult = state.result;
                    state.isSearching = false;
                    submitBtn.innerText = '给我一首诗';
                    renderResult();
                    return;
                }

                if (useSameMood && state.lastResult) {
                    const mood = state.lastMood || matchMood(state.userInput);
                    const candidates = poems.filter(p => p.moods && p.moods.includes(mood));

                    if (candidates.length > 0) {
                        const otherPoems = candidates.filter(p => p.id !== state.result?.poem?.id);
                        const poem = otherPoems.length > 0
                            ? otherPoems[Math.floor(Math.random() * otherPoems.length)]
                            : candidates[Math.floor(Math.random() * candidates.length)];

                        state.result = {
                            poem,
                            mood: moodMap[mood] || { name: '平静', emoji: '🌊', color: '#7CB490' },
                            psychology: poem.psychology || "这首诗送给你"
                        };
                    }
                } else {
                    const result = recommendPoem(state.userInput);
                    state.result = result;
                    if (result) {
                        state.lastMood = matchMood(state.userInput);
                    }
                }

                state.lastResult = state.result;
                state.isSearching = false;
                submitBtn.innerText = '给我一首诗';
                renderResult();
            }, 600);
        }

        function changePoem() {
            getPoem(true);
        }

        function init() {
            renderMoodTags();

            userInput.addEventListener('input', (e) => {
                state.userInput = e.target.value;
                state.isInputActive = true;
                state.selectedMood = null;
                renderMoodTags();
                updateSubmitBtnState();
            });

            userInput.addEventListener('focus', () => {
                state.isInputActive = true;
                state.selectedMood = null;
                renderMoodTags();
            });

            submitBtn.addEventListener('click', () => {
                getPoem();
            });

            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && (state.userInput.trim() || state.selectedMood)) {
                    getPoem();
                }
            });

            updateSubmitBtnState();

            document.getElementById('poemCount').innerText = `已收录 ${poems.length} 首诗词`;
        }

        init();
    </script>
